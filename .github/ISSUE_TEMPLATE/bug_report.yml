name: Bug report
description: Report a reproducible Traffic Lights+ problem
title: "[Bug] "
labels: [bug]
body:
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: macOS 15.7
    validations:
      required: true
  - type: input
    id: app
    attributes:
      label: Affected application
      placeholder: Finder, Music, Safari...
    validations:
      required: true
  - type: dropdown
    id: style
    attributes:
      label: Control style
      options:
        - macOS circles
        - Edge-aligned squares
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots or logs
      description: Remove personal information before uploading.
